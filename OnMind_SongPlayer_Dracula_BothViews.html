<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OnMind · Song Player — два вида</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--orange:#F48122;--pill:100px;--card:28px}
  /* ===== palettes per view ===== */
  body[data-view="image"]{--bg:#0b0a10;--panel:rgba(20,17,28,.66);--ink:#f5f3fb;--dim:#b9b2c9;--faint:#7d7595;
    --accent:#00C945;--accent-ink:#062a12;--track:rgba(255,255,255,.18);--border:rgba(255,255,255,.12);--tshadow:0 2px 18px rgba(0,0,0,.6)}
  body[data-view="themed"][data-theme="dark"]{--bg:#0E1512;--panel:#19211c;--ink:#f5f7f4;--dim:#9fb0a6;--faint:#6e7e73;
    --accent:#00C945;--accent-ink:#062a12;--track:rgba(255,255,255,.16);--border:rgba(255,255,255,.10);--tshadow:none}
  body[data-view="themed"][data-theme="champagne"]{--bg:#F4ECDB;--panel:#FBF6EC;--ink:#2c2620;--dim:#7a7060;--faint:#a99c84;
    --accent:#0a8f38;--accent-ink:#ffffff;--track:rgba(0,0,0,.12);--border:rgba(0,0,0,.08);--tshadow:none}

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;transition:background .35s ease,color .35s ease}
  .bgimage,.scrim{position:fixed;inset:0;z-index:0;display:none}
  .bgimage{background-size:cover;background-position:center top}
  .scrim{background:linear-gradient(180deg,rgba(11,10,16,.7),rgba(11,10,16,.38) 30%,rgba(11,10,16,.9))}
  body[data-view="image"] .bgimage,body[data-view="image"] .scrim{display:block}

  .app{position:relative;z-index:1;width:100%;max-width:720px;min-height:100vh;display:flex;flex-direction:column;padding:14px clamp(14px,4vw,26px) 0}

  /* ===== preview switcher ===== */
  .viewbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .vlabel{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
  .pillseg{display:inline-flex;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--pill);padding:3px}
  .pillseg button{border:none;background:transparent;color:var(--dim);font:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:var(--pill);cursor:pointer}
  .pillseg button.on{background:var(--accent);color:var(--accent-ink)}
  .theme-wrap{display:none;align-items:center;gap:8px}
  body[data-view="themed"] .theme-wrap{display:inline-flex}

  header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-top:8px}
  .eyebrow{display:none;align-items:center;gap:8px;color:var(--dim);font-size:12.5px;font-weight:600}
  body[data-view="themed"] .eyebrow{display:flex}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .song-title{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(32px,7.5vw,48px);line-height:.98;margin:6px 0 4px;text-shadow:var(--tshadow)}
  .song-sub{color:var(--dim);font-size:13px;text-shadow:var(--tshadow)}
  .cover-thumb{width:84px;height:126px;object-fit:cover;border-radius:12px;flex:none;border:1px solid var(--border);box-shadow:0 8px 22px rgba(0,0,0,.3);display:none}
  body[data-view="themed"] .cover-thumb{display:block}

  .stage{flex:1;position:relative;overflow:hidden;margin:12px 0 4px;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent);mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent)}
  .scroller{position:absolute;left:0;right:0;transition:transform .45s cubic-bezier(.22,.61,.36,1)}
  .ln{padding:12px 2px;cursor:pointer}
  .ln .tr{font-size:clamp(21px,5.2vw,30px);font-weight:600;line-height:1.22;color:var(--faint);transition:color .3s,transform .35s;transform-origin:left;text-shadow:var(--tshadow)}
  .ln .en{font-size:clamp(17px,4.4vw,24px);font-weight:500;line-height:1.26;color:var(--dim);opacity:.74;margin-top:6px;transition:opacity .3s,color .3s;text-shadow:var(--tshadow)}
  .ln.active .tr{color:var(--accent);transform:scale(1.015)}
  .ln.active .en{opacity:1;color:var(--dim)}
  .ln.past .tr{color:var(--faint)}
  .hide-en .en{display:none}

  .controls{padding:10px 2px max(16px,env(safe-area-inset-bottom))}
  .seek{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .time{font-variant-numeric:tabular-nums;font-size:12px;color:var(--dim);min-width:36px;text-align:center}
  input[type=range].bar{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:99px;background:linear-gradient(90deg,var(--accent) var(--p,0%),var(--track) var(--p,0%))}
  input[type=range].bar::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent)}
  input[type=range].bar::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent)}
  .row{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
  .leftc{display:flex;align-items:center;gap:8px}
  .play{width:56px;height:56px;border-radius:50%;border:none;flex:none;cursor:pointer;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.28)}
  .play svg{width:23px;height:23px}
  .nudge{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer}
  .seg{display:inline-flex;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--pill);padding:3px}
  .seg button{border:none;background:transparent;color:var(--dim);font:inherit;font-size:13px;font-weight:600;padding:8px 13px;border-radius:var(--pill);cursor:pointer}
  .seg button.on{background:var(--accent);color:var(--accent-ink)}
  .ghost{border:1px solid var(--border);background:transparent;color:var(--dim);font:inherit;font-size:12.5px;font-weight:600;padding:9px 13px;border-radius:var(--pill);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .ghost.on{border-color:var(--orange);color:var(--orange)}
  .filepick{margin-top:9px;font-size:11.5px;color:var(--faint)} .filepick label{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:3px} .filepick input{display:none}
  .sync{display:none;margin-top:11px;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--card);padding:16px} .sync.open{display:block}
  .sync h3{margin:0 0 4px;font-size:15px} .sync p{margin:0 0 13px;color:var(--dim);font-size:12.5px;line-height:1.5}
  .sync-now small{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
  .sync-now span{font-family:"Cormorant Garamond",serif;font-size:23px}
  .progress{height:5px;background:var(--track);border-radius:99px;overflow:hidden;margin:11px 0 4px} .progress i{display:block;height:100%;background:var(--accent);width:0%;transition:width .2s}
  .count{font-size:12px;color:var(--dim);text-align:right}
  .tap{width:100%;padding:16px;border:none;border-radius:18px;background:var(--orange);color:#2a1404;font:inherit;font-weight:700;font-size:16px;cursor:pointer;margin:10px 0 11px}
  .sync-actions{display:flex;gap:8px;flex-wrap:wrap}
  @media(max-width:520px){.cover-thumb{width:66px;height:99px}}
</style>
</head>
<body data-view="image" data-theme="dark">
<div class="bgimage" id="bgimage"></div><div class="scrim"></div>

<div class="app">
  <div class="viewbar">
    <span class="vlabel">Вид</span>
    <div class="pillseg view-seg">
      <button data-view="image" class="on">Картинка фоном</button>
      <button data-view="themed">Темы</button>
    </div>
    <div class="theme-wrap">
      <span class="vlabel">Тема</span>
      <div class="pillseg theme-seg">
        <button data-theme="dark" class="on">Тёмная</button>
        <button data-theme="champagne">Шампань</button>
      </div>
    </div>
  </div>

  <header>
    <div class="titles">
      <div class="eyebrow"><span class="dot"></span> OnMind · Song Player</div>
      <h1 class="song-title">Dracula</h1>
      <div class="song-sub">Bram Stoker · story-song · A1</div>
    </div>
    <img class="cover-thumb" id="thumb" alt="cover">
  </header>

  <div class="stage"><div class="scroller" id="scroller"></div></div>

  <div class="controls">
    <div class="seek"><span class="time" id="cur">0:00</span>
      <input type="range" class="bar" id="bar" min="0" max="100" value="0" step="0.1"><span class="time" id="dur">0:00</span></div>
    <div class="row">
      <div class="leftc">
        <button class="play" id="play" aria-label="Грати"><svg id="ico" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="nudge" id="back1" title="-0.5с">◂</button><button class="nudge" id="fwd1" title="+0.5с">▸</button>
      </div>
      <div class="seg" id="seg"><button data-sub="uk" class="on">Укр</button><button data-sub="ru">Рус</button></div>
      <button class="ghost" id="swapBtn">⇅ Місцями</button>
      <button class="ghost on" id="origBtn">2-й рядок</button>
      <button class="ghost" id="syncBtn">⏱ Тайминг</button>
    </div>
    <div class="filepick">Звук не грає? <label for="file">Завантажити аудіофайл</label> — або поклади <code>Dracula_Song_A1.mp3</code> поруч. <input type="file" id="file" accept="audio/*"></div>
    <div class="sync" id="syncPanel">
      <h3>Режим розмітки таймінгу</h3>
      <p>Увімкни відтворення і натискай <b>пробіл</b> на старті кожного рядка. Далі «Експорт JSON».</p>
      <div class="sync-now"><small>Наступний рядок</small><span id="nextLine"></span></div>
      <div class="progress"><i id="pbar"></i></div><div class="count" id="syncCount"></div>
      <button class="tap" id="tapBtn">● Поставити мітку (пробіл)</button>
      <div class="sync-actions"><button class="ghost" id="undoBtn">↶ Відмінити</button><button class="ghost" id="resetBtn">Скинути</button><button class="ghost on" id="exportBtn">⬇ Експорт JSON</button></div>
    </div>
  </div>
</div>
<audio id="audio" src="Dracula_Song_A1.mp3" preload="metadata"></audio>

const STARTS=[12.04,20.35,26.46,32.74,39.88,46.31,52.17,59.03,68.06,74.27,80.76,86.81,94.41,100.84,106.62,113.72,120.41,126.08,132.28,138.7,145.84,152.2,157.78,164.15,171.26,177.33,183.15,189.56,196.5,202.6,208.39,214.73,221.59,227.81,234.1,240.97];
let LINES=RAW.map((r,i)=>({sec:r[0],en:r[1],uk:r[2],ru:r[3],start:STARTS[i]}));

let subLang='uk',activeIdx=-1,syncMode=false,syncPtr=0,swap=false;
const $=id=>document.getElementById(id), audio=$('audio'), scroller=$('scroller');

// view + theme switchers
document.querySelectorAll('.view-seg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.view-seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); document.body.dataset.view=b.dataset.view; lastPos=-999; renderActive();}));
document.querySelectorAll('.theme-seg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.theme-seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); document.body.dataset.theme=b.dataset.theme;}));

function buildStage(){
  scroller.innerHTML=LINES.map((l,i)=>`<div class="ln" data-i="${i}"><div class="tr"></div><div class="en"></div></div>`).join('');
  scroller.querySelectorAll('.ln').forEach(el=>el.addEventListener('click',()=>{audio.currentTime=LINES[+el.dataset.i].start+0.05;}));
  paintText();
}
function paintText(){
  const tl=subLang==='ru'?'ru':'uk';
  scroller.querySelectorAll('.ln').forEach((el,i)=>{
    const t=LINES[i][tl]||'', en=LINES[i].en||'';
    el.querySelector('.tr').textContent=swap?en:t;
    el.querySelector('.en').textContent=swap?t:en;
  });
}
buildStage();

function findIdx(t){let idx=-1;for(let i=0;i<LINES.length;i++){if(t+0.001>=LINES[i].start)idx=i;else break;}return idx;}
let lastPos=-999,firstPos=true;
function positionTo(p){ if(p===lastPos)return; lastPos=p; const el=scroller.children[p]; if(!el)return;
  const h=scroller.parentElement.clientHeight,y=el.offsetTop+el.offsetHeight/2;
  if(firstPos)scroller.style.transition='none';
  scroller.style.transform=`translateY(${h/2-y}px)`;
  if(firstPos){ void scroller.offsetHeight; scroller.style.transition=''; firstPos=false; } }
function renderActive(){ const idx=findIdx(audio.currentTime); positionTo(idx<0?0:idx);
  if(idx===activeIdx)return; activeIdx=idx;
  scroller.querySelectorAll('.ln').forEach((el,i)=>{el.classList.toggle('active',i===idx);el.classList.toggle('past',i<idx);}); }
window.addEventListener('resize',()=>{lastPos=-999;renderActive();});
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>{lastPos=-999;renderActive();});

const fmt=s=>{s=Math.max(0,s|0);return (s/60|0)+':'+String(s%60).padStart(2,'0');};
$('play').addEventListener('click',()=>audio.paused?audio.play():audio.pause());
audio.addEventListener('play',()=>$('ico').innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>');
audio.addEventListener('pause',()=>$('ico').innerHTML='<path d="M8 5v14l11-7z"/>');
audio.addEventListener('loadedmetadata',()=>{$('dur').textContent=fmt(audio.duration);$('bar').max=audio.duration;});
audio.addEventListener('timeupdate',()=>{$('cur').textContent=fmt(audio.currentTime);$('bar').value=audio.currentTime;
  $('bar').style.setProperty('--p',(audio.currentTime/(audio.duration||1)*100)+'%');renderActive();});
$('bar').addEventListener('input',()=>{audio.currentTime=+$('bar').value;renderActive();});
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');subLang=b.dataset.sub;paintText();}));
const origBtn=$('origBtn');
origBtn.addEventListener('click',()=>{const on=origBtn.classList.toggle('on');document.querySelector('.stage').classList.toggle('hide-en',!on);});
const swapBtn=$('swapBtn');
swapBtn.addEventListener('click',()=>{swap=!swap;swapBtn.classList.toggle('on',swap);paintText();});
function nudge(d){LINES.forEach(l=>l.start=+(l.start+d).toFixed(2));paintText();activeIdx=-2;renderActive();}
$('back1').addEventListener('click',()=>nudge(-0.5));$('fwd1').addEventListener('click',()=>nudge(0.5));
$('file').addEventListener('change',e=>{const f=e.target.files[0];if(f){audio.src=URL.createObjectURL(f);audio.play();}});

const syncPanel=$('syncPanel');
function refreshSync(){$('nextLine').textContent=syncPtr<LINES.length?LINES[syncPtr].en:'✓ Усі рядки розмічено';$('syncCount').textContent=`${syncPtr} / ${LINES.length}`;$('pbar').style.width=(syncPtr/LINES.length*100)+'%';}
$('syncBtn').addEventListener('click',()=>{syncMode=!syncMode;syncPanel.classList.toggle('open',syncMode);$('syncBtn').classList.toggle('on',syncMode);if(syncMode){syncPtr=0;refreshSync();}});
function stamp(){if(syncPtr>=LINES.length)return;LINES[syncPtr].start=+audio.currentTime.toFixed(2);syncPtr++;activeIdx=-2;renderActive();refreshSync();}
$('tapBtn').addEventListener('click',stamp);
document.addEventListener('keydown',e=>{if(e.code==='Space'&&syncMode){const a=document.activeElement;if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'))return;e.preventDefault();stamp();}});
$('undoBtn').addEventListener('click',()=>{if(syncPtr>0){syncPtr--;refreshSync();}});
$('resetBtn').addEventListener('click',()=>{LINES=RAW.map((r,i)=>({sec:r[0],en:r[1],uk:r[2],ru:r[3],start:STARTS[i]}));buildStage();syncPtr=0;activeIdx=-2;renderActive();refreshSync();});
$('exportBtn').addEventListener('click',()=>{
  const out={id:"dracula_a1",audio:"Dracula_Song_A1.mp3",level:"A1",langs:["uk","ru"],
    lines:LINES.map((l,i)=>({i,section:l.sec,start:l.start,end:i<LINES.length-1?LINES[i+1].start:+(l.start+4).toFixed(2),en:l.en,uk:l.uk,ru:l.ru}))};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));a.download='dracula_a1.timings.json';a.click();});

renderActive();refreshSync();
fetch('song.json').then(r=>r.ok?r.json():null).then(d=>{
  if(d&&Array.isArray(d.lines)&&d.lines.length){
    LINES=d.lines.map(l=>({sec:l.section||'',en:l.en||'',uk:l.uk||l.en||'',ru:l.ru||l.en||'',start:+l.start}));
    if(d.audio)audio.src=d.audio;
    buildStage();lastPos=-999;activeIdx=-2;renderActive();
  }
}).catch(()=>{});
</script>
